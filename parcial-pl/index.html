<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabores del Eje — Novela Gerencial Interactiva</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--card:#151d30;--card2:#1a2540;
  --amber:#f59e0b;--amber-d:#d97706;--amber-l:#fbbf24;
  --green:#10b981;--green-d:#059669;--red:#f43f5e;--red-d:#e11d48;
  --blue:#3b82f6;--purple:#8b5cf6;--teal:#14b8a6;--pink:#ec4899;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.5);
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
h1,h2,h3{font-family:'Playfair Display',serif}

/* ===== HUD (Header) ===== */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(10,14,26,.92);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:none;padding:.6rem 1.2rem;
  align-items:center;justify-content:space-between;
}
.hud.active{display:flex}
.hud-money{display:flex;align-items:center;gap:.5rem;font-weight:800;font-size:1.15rem}
.hud-money .symbol{color:var(--amber);font-size:1.3rem}
.hud-money .amount{font-variant-numeric:tabular-nums;transition:color .3s}
.hud-chapter{font-size:.8rem;color:var(--text3);text-align:center}
.hud-timer{font-size:1.1rem;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px}
.hud-timer.ok{color:var(--green)}.hud-timer.warn{color:var(--amber)}.hud-timer.danger{color:var(--red);animation:pulse 1s infinite}

/* ===== MONEY FLOAT ===== */
.money-float{
  position:fixed;top:55px;left:50%;transform:translateX(-50%);
  font-size:1.6rem;font-weight:900;z-index:200;
  pointer-events:none;animation:floatUp 1.8s ease-out forwards;
  text-shadow:0 2px 12px rgba(0,0,0,.7);
}
.money-float.pos{color:var(--green)}
.money-float.neg{color:var(--red)}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-60px)}}

/* ===== TOASTS ===== */
#toasts{position:fixed;top:60px;right:1rem;z-index:300;display:flex;flex-direction:column;gap:.5rem}
.toast{
  padding:.7rem 1.1rem;border-radius:10px;font-weight:600;font-size:.88rem;
  max-width:380px;box-shadow:var(--shadow);
  transform:translateX(120%);opacity:0;transition:all .4s cubic-bezier(.4,0,.2,1);
}
.toast.show{transform:translateX(0);opacity:1}
.toast.info{background:var(--blue);color:#fff}
.toast.success{background:var(--green-d);color:#fff}
.toast.warning{background:var(--amber-d);color:#fff}
.toast.danger{background:var(--red-d);color:#fff}

/* ===== SCENE CONTAINER ===== */
.scene{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;padding:5rem 1.2rem 2rem;
  max-width:720px;margin:0 auto;
  opacity:0;transform:translateY(15px);
  transition:opacity .5s,transform .5s;
}
.scene.visible{opacity:1;transform:translateY(0)}

/* ===== SCENE ILLUSTRATION ===== */
.scene-illust{
  text-align:center;font-size:4rem;margin-bottom:1rem;
  filter:drop-shadow(0 4px 20px rgba(245,158,11,.2));
  animation:float 4s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ===== CHAPTER TAG ===== */
.chapter-tag{
  text-align:center;text-transform:uppercase;letter-spacing:5px;
  font-size:.72rem;font-weight:700;color:var(--amber);margin-bottom:.3rem;
}
.scene-title{
  text-align:center;font-size:1.8rem;margin-bottom:1.2rem;
  background:linear-gradient(135deg,var(--amber-l),var(--amber));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}

/* ===== NARRATIVE ===== */
.narrative{
  font-size:1.02rem;line-height:1.85;color:var(--text2);
  margin-bottom:1rem;padding-bottom:1rem;
  border-bottom:1px solid rgba(255,255,255,.04);
}
.narrative em{color:var(--amber-l);font-style:italic}
.narrative strong{color:var(--text);font-weight:600}

/* ===== DIALOGUE ===== */
.dialogue{
  display:flex;gap:.8rem;margin:.8rem 0;
  animation:fadeSlide .4s ease-out both;
}
.dialogue .avatar{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
}
.dialogue .bubble{
  background:var(--card2);border-radius:2px var(--radius) var(--radius) var(--radius);
  padding:.8rem 1.1rem;flex:1;position:relative;
}
.dialogue .bubble::before{
  content:'';position:absolute;left:-6px;top:10px;
  border:6px solid transparent;border-right-color:var(--card2);
}
.dialogue .char-name{font-size:.75rem;font-weight:700;margin-bottom:.2rem}
.dialogue .char-text{font-size:.93rem;line-height:1.6;color:var(--text2)}
.av-hernando{background:linear-gradient(135deg,var(--amber),var(--amber-d))}
.av-marcela{background:linear-gradient(135deg,var(--teal),#0d9488)}
.av-camilo{background:linear-gradient(135deg,var(--purple),#7c3aed)}
.nm-hernando{color:var(--amber)}.nm-marcela{color:var(--teal)}.nm-camilo{color:var(--purple)}

/* ===== DATA TABLE (for LP data) ===== */
.lp-table{
  width:100%;border-collapse:separate;border-spacing:0;
  margin:1rem 0;border-radius:var(--radius);overflow:hidden;
  border:1px solid rgba(255,255,255,.07);font-size:.88rem;
}
.lp-table th{background:rgba(245,158,11,.1);color:var(--amber-l);padding:.6rem .8rem;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
.lp-table td{padding:.5rem .8rem;text-align:center;border-top:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums}
.lp-table .label{text-align:left;font-weight:600;color:var(--amber-l)}

/* ===== CHOICES ===== */
.choices{display:flex;flex-direction:column;gap:.7rem;margin-top:1.2rem}
.choice-btn{
  display:flex;align-items:flex-start;gap:.8rem;
  padding:1rem 1.2rem;border-radius:var(--radius);
  background:var(--card);border:2px solid rgba(255,255,255,.07);
  cursor:pointer;transition:all .25s;text-align:left;
  font-family:inherit;font-size:.95rem;color:var(--text);
  line-height:1.5;width:100%;
}
.choice-btn:hover{background:var(--card2);border-color:rgba(245,158,11,.25);transform:translateX(4px)}
.choice-btn:active{transform:translateX(2px) scale(.99)}
.choice-btn .letter{
  min-width:36px;height:36px;border-radius:50%;
  background:rgba(245,158,11,.12);color:var(--amber);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.95rem;flex-shrink:0;
}
.choice-btn .choice-text{padding-top:.3rem}
.choice-btn.disabled{opacity:.5;pointer-events:none}
.choice-btn.correct{border-color:var(--green);background:rgba(16,185,129,.08)}
.choice-btn.wrong{border-color:var(--red);background:rgba(244,63,94,.06);opacity:.6}
.choice-btn.selected-correct{border-color:var(--green);background:rgba(16,185,129,.15);box-shadow:0 0 20px rgba(16,185,129,.15)}
.choice-btn.selected-wrong{border-color:var(--red);background:rgba(244,63,94,.12);box-shadow:0 0 20px rgba(244,63,94,.15)}

/* ===== FEEDBACK ===== */
.feedback{
  margin-top:1rem;padding:1.2rem;border-radius:var(--radius);
  animation:fadeSlide .4s ease-out both;
}
.feedback.correct{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2)}
.feedback.wrong{background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.15)}
.feedback .fb-icon{font-size:1.5rem;margin-bottom:.3rem}
.feedback .fb-text{color:var(--text2);line-height:1.6;font-size:.92rem}
.feedback .fb-money{font-size:1.2rem;font-weight:800;margin-top:.5rem}

/* ===== CONTINUE BUTTON ===== */
.btn-continue{
  display:block;width:100%;padding:1rem;margin-top:1.2rem;
  border:none;border-radius:var(--radius);font-family:inherit;
  font-size:1.05rem;font-weight:700;cursor:pointer;
  transition:all .25s;
}
.btn-continue.primary{
  background:linear-gradient(135deg,var(--amber),var(--amber-d));
  color:#000;box-shadow:0 4px 20px rgba(245,158,11,.25);
}
.btn-continue.primary:hover{box-shadow:0 6px 30px rgba(245,158,11,.4);transform:translateY(-1px)}
.btn-continue.success{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff}
.btn-continue.danger{background:linear-gradient(135deg,var(--red),var(--red-d));color:#fff}
.btn-continue:active{transform:scale(.98)}

/* ===== SPLASH (REGISTRATION) ===== */
.splash{text-align:center;padding-top:0 !important;justify-content:center}
.splash-icon{font-size:4.5rem;margin-bottom:.8rem;animation:float 3s ease-in-out infinite}
.splash h1{font-size:2.6rem;line-height:1.1;margin-bottom:.3rem;background:linear-gradient(135deg,var(--amber-l),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash .sub{font-size:1.15rem;color:var(--text2);font-weight:300;margin-bottom:2rem}
.reg-card{
  background:var(--card);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--radius);padding:1.5rem;max-width:500px;
  margin:0 auto;box-shadow:var(--shadow);text-align:left;
}
.form-row{display:flex;gap:.8rem;margin-bottom:.8rem}
.form-row .fg{flex:1}
.fg label{display:block;font-weight:600;font-size:.82rem;color:var(--text2);margin-bottom:.3rem}
.input{
  width:100%;padding:.65rem .9rem;border-radius:8px;
  border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:var(--text);font-size:.95rem;font-family:inherit;transition:all .2s;
}
.input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.pair-label{font-size:.8rem;color:var(--amber);font-weight:600;text-align:center;margin-bottom:.6rem}

/* ===== RESULTS ===== */
.result-big{font-size:5rem;font-weight:900;font-family:'Playfair Display',serif;text-align:center}
.result-sub{text-align:center;font-size:1.15rem;color:var(--text2);margin-top:.3rem}
.grade-bar{height:10px;background:rgba(255,255,255,.06);border-radius:20px;overflow:hidden;margin:.8rem 0}
.grade-fill{height:100%;border-radius:20px;transition:width 1.5s cubic-bezier(.4,0,.2,1)}
.grade-fill.high{background:linear-gradient(90deg,var(--green),var(--green-d))}
.grade-fill.mid{background:linear-gradient(90deg,var(--amber),var(--amber-d))}
.grade-fill.low{background:linear-gradient(90deg,var(--red),var(--red-d))}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:1rem 0}
.stat-item{background:var(--card);border-radius:10px;padding:.8rem;text-align:center}
.stat-item .stat-val{font-size:1.3rem;font-weight:800}
.stat-item .stat-lbl{font-size:.75rem;color:var(--text3);margin-top:.2rem}

/* ===== CONFETTI ===== */
.confetti{position:fixed;width:8px;height:8px;top:-10px;z-index:400;animation:confettiFall 3s ease-out forwards}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

/* ===== ANIMATIONS ===== */
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .splash h1{font-size:2rem}
  .scene-title{font-size:1.4rem}
  .form-row{flex-direction:column;gap:.5rem}
  .hud{padding:.4rem .8rem;font-size:.9rem}
  .hud-money{font-size:1rem}
}
</style>
</head>
<body>

<div class="hud" id="hud">
  <div class="hud-money"><span class="symbol">💰</span> $<span class="amount" id="hudMoney">100,000,000</span></div>
  <div class="hud-chapter" id="hudChapter"></div>
  <div class="hud-timer ok" id="hudTimer">01:25:00</div>
</div>
<div id="toasts"></div>
<div id="moneyFloats"></div>
<div id="app"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════ */
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbypn0lbCvbnqJBva6fnSTioT_mIiLA8L5yjz8IwT73ZTnGYZgRyKFcy0ardXGXpGKHPiQ/exec';
const TOTAL_TIME = 85 * 60;
const START_MONEY = 100_000_000;
const TEACHER_KEY = 'profe2025';

/* ═══════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════ */
function mulberry32(s){return function(){let t=s+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296}}
function seedFromStr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i)|0;return Math.abs(h)||12345}
function ri(rng,a,b){return Math.floor(rng()*(b-a+1))+a}
function fmt$(n){return'$'+n.toLocaleString('es-CO')}
function fmtK(n){return fmt$(n*1000)}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`}
function shuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

/* ═══════════════════════════════════════════
   SIMPLEX SOLVER
   ═══════════════════════════════════════════ */
function simplex(c,A,b){
  const m=A.length,n=c.length,T=[];
  for(let i=0;i<m;i++){const r=[...A[i]];for(let j=0;j<m;j++)r.push(i===j?1:0);r.push(b[i]);T.push(r)}
  const obj=c.map(v=>-v);for(let j=0;j<m;j++)obj.push(0);obj.push(0);T.push(obj);
  const cols=n+m+1,basis=Array.from({length:m},(_,i)=>n+i);
  for(let it=0;it<200;it++){
    let pc=-1,mv=-1e-9;for(let j=0;j<cols-1;j++)if(T[m][j]<mv){mv=T[m][j];pc=j}
    if(pc===-1)break;
    let pr=-1,mr=Infinity;for(let i=0;i<m;i++)if(T[i][pc]>1e-9){const r=T[i][cols-1]/T[i][pc];if(r<mr){mr=r;pr=i}}
    if(pr===-1)return null;
    const pv=T[pr][pc];for(let j=0;j<cols;j++)T[pr][j]/=pv;
    for(let i=0;i<=m;i++){if(i===pr)continue;const f=T[i][pc];for(let j=0;j<cols;j++)T[i][j]-=f*T[pr][j]}
    basis[pr]=pc;
  }
  const sol=new Array(n).fill(0);for(let i=0;i<m;i++)if(basis[i]<n)sol[basis[i]]=Math.round(T[i][cols-1]*100)/100;
  const Z=Math.round(T[m][cols-1]*100)/100;
  const sl=[];for(let i=0;i<m;i++){let u=0;for(let j=0;j<n;j++)u+=A[i][j]*sol[j];sl.push(Math.round((b[i]-u)*100)/100)}
  // Shadow prices: dual variables from objective row at slack columns
  const shadow=[];for(let i=0;i<m;i++)shadow.push(Math.round(T[m][n+i]*100)/100);
  return{sol,Z,sl,shadow};
}

/* ═══════════════════════════════════════════
   GENERATE LP DATA (per student seed)
   ═══════════════════════════════════════════ */
function genData(rng) {
  const c = [ri(rng,100,150), ri(rng,70,120), ri(rng,80,130)];
  const A = [
    [ri(rng,3,5), ri(rng,4,6), ri(rng,2,3)],
    [ri(rng,4,6), ri(rng,2,4), ri(rng,1,2)],
    [ri(rng,1,2), ri(rng,2,3), ri(rng,2,3)],
    [ri(rng,1,2), ri(rng,1,2), ri(rng,1,2)],
  ];
  const b = [ri(rng,80,120)*10, ri(rng,50,80)*10, ri(rng,18,28)*10, ri(rng,25,45)*10];
  const res = simplex(c,A,b);
  // 2-var problem for final
  const c2 = [ri(rng,60,110), ri(rng,50,100)];
  const A2 = [[ri(rng,2,4),ri(rng,3,5)],[ri(rng,3,5),ri(rng,1,3)],[ri(rng,1,2),ri(rng,2,3)]];
  const b2 = [ri(rng,50,90)*10, ri(rng,40,70)*10, ri(rng,20,40)*10];
  const res2 = simplex(c2,A2,b2);
  // Chorizo for expansion
  const c4 = [...c, ri(rng,90,160)];
  const A4 = A.map((r,i) => [...r, ri(rng,1,3)]);
  const b4 = b.map(v => v + ri(rng,5,15)*10);
  const res4 = simplex(c4,A4,b4);
  return {c,A,b,res, c2,A2,b2,res2, c4,A4,b4,res4, rng};
}

/* ═══════════════════════════════════════════
   BUILD SCENES
   ═══════════════════════════════════════════ */
const PRODS = ['Pandebonos','Buñuelos','Empanadas'];
const EMOJI = ['🥐','🫓','🥟'];
const RES = ['Harina de yuca','Queso campesino','Mano de obra','Horno'];

function buildScenes(d) {
  const {c,A,b,res,c2,A2,b2,res2,c4,A4,b4,res4} = d;
  let bindingIdx = res ? res.sl.indexOf(Math.min(...res.sl)) : 0;
  let slackIdx = res ? res.sl.indexOf(Math.max(...res.sl)) : 3;
  // Guard: binding and slack cannot be the same resource
  if (bindingIdx === slackIdx && res) {
    const sorted = res.sl.map((v,i)=>({v,i})).sort((a,b)=>b.v-a.v);
    slackIdx = sorted[0].i === bindingIdx ? sorted[1].i : sorted[0].i;
  }
  // Real shadow price of queso (constraint 1) from simplex dual variables
  const shadowQueso = res && res.shadow ? Math.round(res.shadow[1]) : 500;

  function wrongSols(sol,Z,n){
    const w=[];
    // Opción cercana pero con x desbalanceadas
    w.push({x:sol.map((v,i)=>Math.round(v+(i===0?5:-3)))});
    // Opción que reparte recursos parejo (error típico de estudiante)
    w.push({x:sol.map((_,i)=>Math.round(sol[i]*0.75+ri(d.rng,2,8)))});
    // Opción con una variable en 0 (extremo del poliedro)
    const zeroVar = ri(d.rng,0,n-1);
    w.push({x:sol.map((v,i)=>i===zeroVar?0:Math.round(v*1.15+ri(d.rng,1,5)))});
    w.forEach(o=>{o.Z=0;for(let i=0;i<n;i++)o.Z+=c[i]*(o.x[i]||0);o.Z=Math.round(o.Z)});
    return w;
  }

  const scenes = {
    /* ────── ACT 1: LLEGADA ────── */
    intro: {
      ch:'Prólogo', title:'Pereira, 6:00 AM', icon:'🌅',
      narr: `El aroma del café recién tostado se mezcla con el olor a pandebono caliente. Tu teléfono vibra con un mensaje urgente.`,
      dial:[{c:'hernando',t:`¡Buenos días! Soy Hernando Mejía, fundador de <em>Sabores del Eje Cafetero</em>. Necesito que vengas a la planta en Dosquebradas. <strong>¡Urgente!</strong>`}],
      next:'arrive',
    },
    arrive: {
      ch:'Capítulo 1 — Llegada', title:'La Planta en Dosquebradas', icon:'🏭',
      narr:`Llegas a la planta. El ruido de las máquinas llena el aire. Don Hernando te espera en la oficina con Marcela, la jefa de planta.`,
      dial:[
        {c:'hernando',t:`Producimos tres líneas: <strong>${PRODS.join(', ')}</strong>. Cada lote es de 100 unidades.`},
        {c:'marcela',t:`Tenemos <strong>4 recursos limitados</strong>: harina, queso, mano de obra y horno. Necesitamos optimizar.`},
        {c:'hernando',t:`Tu primera misión: ayúdanos a plantear esto como un modelo matemático. Empecemos por lo básico.`},
      ],
      next:'q_variables',
    },

    /* ────── Q1: VARIABLES ────── */
    q_variables: {
      ch:'Capítulo 1', title:'¿Qué Estamos Decidiendo?', icon:'🤔',
      narr:`Don Hernando te mira expectante. El primer paso para optimizar es definir <strong>qué controlamos</strong>.`,
      dial:[{c:'marcela',t:`¿Cómo definirías las <em>variables de decisión</em> para nuestro modelo?`}],
      choices:[
        {l:'A',t:`x₁ = kg de harina a usar, x₂ = kg de queso a usar, x₃ = horas de mano de obra, x₄ = tandas de horno`,$:-6e6,
         fb:`No. Los recursos son <strong>limitaciones</strong> (restricciones), no decisiones. Las variables deben representar lo que CONTROLAMOS: cuánto producir.`,

      ch:'Capítulo 3 — Solución', title:'Hora de Resolver', icon:'💻',
      narr: `<strong>El modelo completo es:</strong><br>
Max Z = ${c[0]}x₁ + ${c[1]}x₂ + ${c[2]}x₃<br>
s.a.<br>
${RES.map((r,i) => `${A[i].map((a,j)=>`${a}x${j+1}`).join(' + ')} ≤ ${b[i]} <em>(${r})</em>`).join('<br>')}<br>
x₁, x₂, x₃ ≥ 0<br><br>
<em>💡 Puedes abrir Excel y usar Solver para encontrar la solución. Tómate tu tiempo.</em>`,
      dial:[{c:'hernando',t:`Ya tenemos el modelo. ¡Resuélvelo! ¿Cuál es la producción óptima?`}],
      choices: (function(){
        if(!res) return [{l:'A',t:'Error en el modelo',ok:true,$:0,fb:'Error generando',nx:'branch1'}];
        const correct = {l:'?',t:`${PRODS.map((p,i)=>`${EMOJI[i]} ${p}: ${res.sol[i].toFixed(1)} lotes`).join(', ')} → Z = ${fmtK(res.Z)}`,ok:true,$:12e6,
          fb:`¡Excelente! Esa es la solución óptima del Simplex. La ganancia máxima es ${fmtK(res.Z)}.`,
          react:{c:'hernando',t:'¡Increíble! Con esos números vamos a romperla esta semana.'},nx:'q_binding'};
        const ws = wrongSols(res.sol,res.Z,3);
        const wrongs = ws.map(w=>({l:'?',t:`${PRODS.map((p,i)=>`${EMOJI[i]} ${p}: ${w.x[i]} lotes`).join(', ')} → Z = ${fmtK(w.Z)}`,$:-8e6,

        const shuffled = shuffle(all, d.rng);
        shuffled.forEach((o,i)=>o.l=letters[i]);
        return shuffled;
      })(),
    },

/* ═══════════════════════════════════════════
   TOAST + MONEY FLOAT
   ═══════════════════════════════════════════ */
function toast(msg,type='info',dur=5000){
  const el=document.createElement('div');el.className='toast '+type;el.innerHTML=msg;
  document.getElementById('toasts').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),400)},dur);
}
function showMoneyFloat(amount){
  const el=document.createElement('div');
  el.className='money-float '+(amount>=0?'pos':'neg');
  el.textContent=(amount>=0?'+':'')+fmt$(amount);
  document.getElementById('moneyFloats').appendChild(el);
  setTimeout(()=>el.remove(),2000);
}

/* ═══════════════════════════════════════════
   TIMER
   ═══════════════════════════════════════════ */
function startTimer(){
  G.timerStarted=true;
  document.getElementById('hud').classList.add('active');
  G.interval=setInterval(()=>{
    G.remaining--;
    if(G.remaining<=0){G.remaining=0;clearInterval(G.interval);toast('⏰ ¡Tiempo! Enviando resultados...','danger',8000);setTimeout(()=>showEpilogue(),2000)}
    updateHUD();checkNotifs();
  },1000);
}
function updateHUD(){
  const el=document.getElementById('hudTimer');
  el.textContent=fmtTime(G.remaining);
  const pct=G.remaining/TOTAL_TIME;
  el.className='hud-timer '+(pct>.35?'ok':pct>.12?'warn':'danger');
  document.getElementById('hudMoney').textContent=G.money.toLocaleString('es-CO');
}
function checkNotifs(){
  const m=Math.floor(G.remaining/60),ns=G.notifs;
  if(m===60&&!ns.has('60')){ns.add('60');toast('☕ Don Hernando te manda un tinto. Llevas 25 minutos.','info')}
  if(m===42&&!ns.has('42')){ns.add('42');toast('⏱️ Mitad del tiempo. ¿Cómo va la empresa?','warning')}
  if(m===15&&!ns.has('15')){ns.add('15');toast('⚡ ¡15 minutos! Don Hernando está nervioso.','danger',7000)}
  if(m===5&&!ns.has('5')){ns.add('5');toast('🔥 ¡5 MINUTOS! El directorio espera resultados.','danger',10000)}
}

/* ═══════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════ */
const app=document.getElementById('app');

function renderScene(id){
  G.scene=id;
  const sc=G.scenes[id];
  if(!sc){showEpilogue();return}
  if(sc.branch){const next=sc.branch(G);renderScene(next);return}
  if(sc.epilogue){showEpilogue();return}

  document.getElementById('hudChapter').textContent=sc.ch||'';
  let html=`<div class="scene" id="currentScene">`;
  if(sc.icon) html+=`<div class="scene-illust">${sc.icon}</div>`;
  if(sc.ch) html+=`<div class="chapter-tag">${sc.ch}</div>`;
  if(sc.title) html+=`<h2 class="scene-title">${sc.title}</h2>`;
  if(sc.narr) html+=`<div class="narrative">${sc.narr}</div>`;
  if(sc.dial) sc.dial.forEach(d=>{html+=dialogue(d.c,d.t)});
  if(sc.choices){
    html+=`<div class="choices" id="choices">`;
    sc.choices.forEach((ch,i)=>{
      html+=`<button class="choice-btn" data-idx="${i}" onclick="makeChoice(${i})">
        <span class="letter">${ch.l}</span>
        <span class="choice-text">${ch.t}</span>
      </button>`;
    });
    html+=`</div>`;
  } else {
    html+=`<button class="btn-continue primary" onclick="goNext('${sc.next}')">${sc.next==='arrive'?'Ir a la planta →':'Continuar →'}</button>`;
  }
  html+=`</div>`;
  app.innerHTML=html;
  window.scrollTo({top:0,behavior:'smooth'});
  requestAnimationFrame(()=>document.getElementById('currentScene').classList.add('visible'));
}

function dialogue(char,text){
  const avClass={hernando:'av-hernando',marcela:'av-marcela',camilo:'av-camilo'}[char]||'';
  const nmClass={hernando:'nm-hernando',marcela:'nm-marcela',camilo:'nm-camilo'}[char]||'';
  const emoji={hernando:'👨‍💼',marcela:'👩‍🔧',camilo:'🧑‍💻'}[char]||'';
  const name={hernando:'Don Hernando',marcela:'Marcela',camilo:'Camilo'}[char]||'';
  return `<div class="dialogue">
    <span class="avatar ${avClass}">${emoji}</span>
    <div class="bubble">
      <div class="char-name ${nmClass}">${name}</div>
      <div class="char-text">${text}</div>
    </div>
  </div>`;
}

function makeChoice(idx){
  const sc=G.scenes[G.scene];
  const ch=sc.choices[idx];
  // Disable all buttons
  document.querySelectorAll('.choice-btn').forEach((btn,i)=>{
    btn.classList.add('disabled');
    if(i===idx) btn.classList.add(ch.ok?'selected-correct':'selected-wrong');
    else if(ch.ok===true && sc.choices[i].ok) btn.classList.add('correct');
    else if(ch.ok && !sc.choices[i].ok) btn.classList.add('wrong');
    else if(!ch.ok && sc.choices[i].ok) btn.classList.add('correct');
    else btn.classList.add('wrong');
  });
  // Update money
  G.money += ch.$;
  showMoneyFloat(ch.$);
  updateHUD();
  // Record
  G.history.push({scene:G.scene, choice:idx, money:ch.$, correct:!!ch.ok});
  // Show feedback
  const fbDiv=document.createElement('div');
  fbDiv.className='feedback '+(ch.ok?'correct':'wrong');
  fbDiv.innerHTML=`
    <div class="fb-icon">${ch.ok?'✅':'❌'}</div>
    <div class="fb-text">${ch.fb}</div>
    <div class="fb-money" style="color:${ch.$>=0?'var(--green)':'var(--red)'}">${ch.$>=0?'+':''}${fmt$(ch.$)}</div>
    ${ch.react?dialogue(ch.react.c,ch.react.t):''}
    <button class="btn-continue ${ch.ok?'success':'danger'}" onclick="goNext('${ch.nx}')">Continuar →</button>
  `;
  document.getElementById('choices').after(fbDiv);
  fbDiv.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function goNext(id){
  // Fade out
  const sc=document.getElementById('currentScene');
  if(sc){sc.style.opacity='0';sc.style.transform='translateY(-10px)'}
  setTimeout(()=>renderScene(id),350);
}

  return Math.min(5.0, Math.max(0.5, Math.round(((money - 40e6) / (180e6 - 40e6)) * 45 + 5) / 10));
}

    <div style="background:var(--card);border-radius:var(--radius);padding:1.2rem;margin:1rem 0;border:1px solid rgba(255,255,255,.06)">
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-val" style="color:var(--amber)">${fmt$(money)}</div><div class="stat-lbl">Capital Final</div></div>
        <div class="stat-item"><div class="stat-val">${correct}/${total}</div><div class="stat-lbl">Respuestas Correctas</div></div>
        <div class="stat-item"><div class="stat-val">${timeUsed} min</div><div class="stat-lbl">Tiempo Usado</div></div>
        <div class="stat-item"><div class="stat-val">${G.history.length}</div><div class="stat-lbl">Decisiones Tomadas</div></div>
      </div>
    </div>

    <div style="background:var(--card);border-radius:var(--radius);padding:1rem;margin:1rem 0;border:1px solid rgba(255,255,255,.06)">
      <p><span style="color:var(--text3)">Integrante 1:</span> <strong>${G.nombre}</strong> (${G.codigo})</p>
      ${G.nombre2?`<p><span style="color:var(--text3)">Integrante 2:</span> <strong>${G.nombre2}</strong> (${G.codigo2})</p>`:''}
    </div>

    ${dialogue('hernando', grade>=3
      ? `Ha sido un placer, <strong>${G.nombre.split(' ')[0]}${G.nombre2?' y '+G.nombre2.split(' ')[0]:''}</strong>. Sabores del Eje tiene futuro gracias a personas como ustedes.`
      : `<strong>${G.nombre.split(' ')[0]}${G.nombre2?' y '+G.nombre2.split(' ')[0]:''}</strong>, la PL es una herramienta poderosa. ¡A practicar más!`)}

    <div style="text-align:center;margin:1.5rem 0">
      ${SHEETS_URL?`<button class="btn-continue success" id="submitBtn" onclick="finalSubmit()">Enviar Resultados al Profesor 📨</button>`
      :'<p style="color:var(--amber)">⚠️ Sin Google Sheets configurado. Toma pantallazo.</p>'}
    </div>

    <p style="text-align:center;color:var(--text3);font-size:.8rem;margin-top:2rem">
      Administración de Operaciones 2 — UTP — ${new Date().toLocaleDateString('es-CO')}<br>
      Novela Gerencial Interactiva v2.0
    </p>
  </div>`;

  if(grade>=4.0) launchConfetti();
}

function launchConfetti(){
  const colors=['#f59e0b','#10b981','#3b82f6','#8b5cf6','#f43f5e','#14b8a6'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'vw';p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration=(2+Math.random()*2)+'s';p.style.animationDelay=Math.random()*1.5+'s';
    p.style.width=(6+Math.random()*8)+'px';p.style.height=p.style.width;
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    document.body.appendChild(p);setTimeout(()=>p.remove(),5000);
  }
}

/* ═══════════════════════════════════════════
   GOOGLE SHEETS
   ═══════════════════════════════════════════ */
async function registerSheets(){
  if(!SHEETS_URL)return;
  try{await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({action:'register',nombre1:G.nombre,codigo1:G.codigo,nombre2:G.nombre2,codigo2:G.codigo2}),headers:{'Content-Type':'text/plain'},mode:'no-cors'})}catch(e){}
}
async function finalSubmit(){
  if(G.submitted)return;
  const btn=document.getElementById('submitBtn');
  if(btn){btn.disabled=true;btn.textContent='Enviando...'}
  const grade=calcGrade(G.money);
  try{
    await fetch(SHEETS_URL,{method:'POST',body:JSON.stringify({
      action:'update',codigo1:G.codigo,
      notaCap1:'-',notaCap2:'-',notaCap3:'-',
      notaFinal:grade.toFixed(1),
      tiempoUsado:Math.round((TOTAL_TIME-G.remaining)/60),
      ruta:`${G.history.filter(h=>h.correct).length}/${G.history.length} correctas`,
      respuestas:G.history,
    }),headers:{'Content-Type':'text/plain'},mode:'no-cors'});
    G.submitted=true;
    toast('✅ ¡Resultados enviados!','success',8000);
    if(btn)btn.textContent='✅ Enviado';
  }catch(e){
    toast('Error al enviar. Toma pantallazo.','danger',8000);
    if(btn){btn.disabled=false;btn.textContent='Reintentar'}
  }
}

/* ═══════════════════════════════════════════
   SPLASH / REGISTRATION
   ═══════════════════════════════════════════ */
function showSplash(){
  app.innerHTML=`<div class="scene splash visible">
    <div class="splash-icon">🏭</div>
    <h1>Sabores del Eje<br>Cafetero</h1>
    <p class="sub">Novela Gerencial Interactiva — Parcial de PL</p>
    <div class="reg-card">
      <div class="pair-label">Individual o en parejas</div>
      <div class="form-row">
        <div class="fg" style="flex:2"><label>Integrante 1 — Nombre</label><input class="input" id="rn1" placeholder="Nombre completo..." autofocus></div>
        <div class="fg"><label>Código</label><input class="input" id="rc1" placeholder="1088..."></div>
      </div>
      <div class="form-row" style="opacity:.5;transition:opacity .3s" id="pair" onfocusin="this.style.opacity='1'">
        <div class="fg" style="flex:2"><label>Integrante 2 <span style="color:var(--text3)">(opcional)</span></label><input class="input" id="rn2" placeholder="Compañero/a..."></div>
        <div class="fg"><label>Código</label><input class="input" id="rc2" placeholder="1088..."></div>
      </div>
      <button class="btn-continue primary" onclick="startGame()">Comenzar la Historia 🚀</button>
    </div>
    <p style="color:var(--text3);font-size:.8rem;margin-top:2rem">Administración de Operaciones 2 — UTP</p>
  </div>`;
}

function startGame(){
  const n1=(document.getElementById('rn1')||{}).value?.trim();
  const c1=(document.getElementById('rc1')||{}).value?.trim();
  if(!n1||!c1){toast('Completa nombre y código del integrante 1','warning');return}
  G.nombre=n1;G.codigo=c1;
  G.nombre2=(document.getElementById('rn2')||{}).value?.trim()||'';
  G.codigo2=(document.getElementById('rc2')||{}).value?.trim()||'';
  G.seed=seedFromStr(c1);
  const rng=mulberry32(G.seed);
  G.data=genData(rng);
  G.scenes=buildScenes(G.data);
  registerSheets();
  startTimer();
  renderScene('intro');
}

/* ═══════════════════════════════════════════
   TEACHER MODE
   ═══════════════════════════════════════════ */
function checkTeacher(){
  const p=new URLSearchParams(location.search);
  if(p.get('mode')==='teacher'){
    const pwd=prompt('Contraseña:');
    if(pwd===TEACHER_KEY){showTeacher();return true}
  }
  return false;
}
function showTeacher(){
  app.innerHTML=`<div class="scene visible" style="padding-top:2rem;text-align:center">
    <h1 style="color:var(--amber);font-size:2rem;-webkit-text-fill-color:var(--amber)">📋 Modo Profesor</h1>
    <p style="color:var(--text2);margin:1rem 0">Ingresa código de estudiante para ver datos del modelo:</p>
    <input class="input" id="tc" placeholder="Código" style="max-width:300px;margin:0 auto">
    <button class="btn-continue primary" style="max-width:300px;margin:1rem auto" onclick="showTeacherData()">Ver Datos</button>
    <div id="teacherOut"></div>
  </div>`;
}
function showTeacherData(){
  const code=(document.getElementById('tc')||{}).value?.trim();if(!code)return;
  const seed=seedFromStr(code);const rng=mulberry32(seed);const d=genData(rng);
  const {c,A,b,res,c2,A2,b2,res2,c4,res4}=d;
  document.getElementById('teacherOut').innerHTML=`
    <div style="text-align:left;margin-top:1rem;background:var(--card);padding:1.2rem;border-radius:var(--radius)">
      <h3 style="color:var(--amber)">Seed: ${seed}</h3>
      <p><strong>FO:</strong> Max Z = ${c.join('x + ')}x</p>
      <p><strong>Restricciones:</strong></p>
      ${A.map((r,i)=>`<p>${RES[i]}: ${r.join(', ')} ≤ ${b[i]}</p>`).join('')}
      ${res?`<p><strong>Solución:</strong> ${res.sol.map((v,i)=>`x${i+1}=${v.toFixed(2)}`).join(', ')} | Z=${res.Z.toFixed(2)}</p>
      <p><strong>Holguras:</strong> ${res.sl.map((v,i)=>`${RES[i]}:${v.toFixed(1)}`).join(', ')}</p>`:''}
      <hr style="border-color:rgba(255,255,255,.1);margin:.8rem 0">
      <p><strong>Prob 2 (2var):</strong> Max ${c2[0]}x₁+${c2[1]}x₂</p>
      ${res2?`<p>Sol: x₁=${res2.sol[0].toFixed(2)}, x₂=${res2.sol[1].toFixed(2)} | Z=${res2.Z.toFixed(2)}</p>`:''}
      <hr style="border-color:rgba(255,255,255,.1);margin:.8rem 0">
      <p><strong>Expansión (4var):</strong> Z*=${res4?res4.Z.toFixed(2):'?'}</p>
    </div>`;
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
if(!checkTeacher()) showSplash();
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&G.scene==='splash')startGame()});
</script>
